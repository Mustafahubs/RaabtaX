<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "error": "#ffb4ab",
                "on-tertiary-fixed": "#002109",
                "on-primary": "#002e6a",
                "on-tertiary": "#003915",
                "secondary-container": "#3c4a5e",
                "on-primary-fixed": "#001a42",
                "on-error": "#690005",
                "surface-variant": "#2d3449",
                "surface-container-low": "#131b2e",
                "inverse-on-surface": "#283044",
                "on-secondary-fixed-variant": "#3a485c",
                "primary-fixed-dim": "#adc6ff",
                "primary": "#adc6ff",
                "primary-fixed": "#d8e2ff",
                "inverse-surface": "#dae2fd",
                "tertiary-fixed-dim": "#4ae176",
                "on-secondary": "#233144",
                "on-error-container": "#ffdad6",
                "surface-tint": "#adc6ff",
                "on-surface": "#dae2fd",
                "tertiary-fixed": "#6bff8f",
                "surface-container-lowest": "#060e20",
                "secondary": "#b9c7e0",
                "tertiary-container": "#00a74b",
                "on-primary-container": "#00285d",
                "on-tertiary-container": "#003111",
                "on-tertiary-fixed-variant": "#005321",
                "on-secondary-fixed": "#0d1c2f",
                "background": "#0b1326",
                "secondary-fixed": "#d5e3fd",
                "outline": "#8c909f",
                "surface-dim": "#0b1326",
                "on-background": "#dae2fd",
                "surface-container": "#171f33",
                "outline-variant": "#424754",
                "surface-container-highest": "#2d3449",
                "surface": "#0b1326",
                "surface-container-high": "#222a3d",
                "surface-bright": "#31394d",
                "tertiary": "#4ae176",
                "primary-container": "#4d8eff",
                "inverse-primary": "#005ac2",
                "on-secondary-container": "#abb9d2",
                "error-container": "#93000a",
                "on-primary-fixed-variant": "#004395",
                "secondary-fixed-dim": "#b9c7e0",
                "on-surface-variant": "#c2c6d6"
            },
            "borderRadius": {
                "DEFAULT": "1rem",
                "lg": "2rem",
                "xl": "3rem",
                "full": "9999px"
            },
            "spacing": {
                "touch-target": "3rem",
                "margin-horizontal": "1rem",
                "stack-md": "0.75rem",
                "stack-sm": "0.25rem",
                "gutter": "0.5rem",
                "stack-lg": "1.5rem"
            },
            "fontFamily": {
                "body-md": ["Inter"],
                "headline-md": ["Inter"],
                "headline-lg": ["Inter"],
                "body-lg": ["Inter"],
                "title-lg": ["Inter"],
                "label-sm": ["Inter"],
                "label-lg": ["Inter"],
                "headline-lg-mobile": ["Inter"]
            },
            "fontSize": {
                "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                "headline-md": ["22px", {"lineHeight": "28px", "fontWeight": "600"}],
                "headline-lg": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                "title-lg": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                "label-sm": ["11px", {"lineHeight": "16px", "fontWeight": "400"}],
                "label-lg": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1px", "fontWeight": "500"}],
                "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}]
            }
          }
        }
      }
    </script>
<style>
        body {
            background-color: #0b1326;
            color: #dae2fd;
            -webkit-tap-highlight-color: transparent;
        }
        .otp-box-shadow {
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.4);
        }
        .cursor-blink {
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            from, to { border-color: transparent; }
            50% { border-color: #adc6ff; }
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(51, 65, 85, 0.5);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen font-body-md overflow-hidden">
<!-- Android Status Bar Simulation (Static) -->
<div class="fixed top-0 w-full max-w-[412px] h-8 flex justify-between items-center px-6 z-50 mix-blend-screen opacity-80">
<span class="font-label-lg text-on-surface">12:30</span>
<div class="flex gap-2">
<span class="material-symbols-outlined text-[16px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[16px]">wifi</span>
<span class="material-symbols-outlined text-[16px]">battery_std</span>
</div>
</div>
<!-- Main Mobile Canvas -->
<main class="relative w-full max-w-[412px] h-screen bg-background flex flex-col pt-12 pb-8 px-6">
<!-- Abstract Background Glow Elements (Obsidian Flux Theme) -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary/10 rounded-full blur-[80px]"></div>
<div class="absolute -bottom-24 -left-24 w-80 h-80 bg-tertiary/5 rounded-full blur-[100px]"></div>
<!-- Top Navigation Area -->
<div class="mb-10 flex items-center">
<button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-surface-variant/30 transition-colors">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
</div>
<!-- Header Section -->
<div class="space-y-3 mb-12">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight">Verify Your Number</h1>
<p class="font-body-lg text-on-surface-variant opacity-80 leading-relaxed">
                We sent a 4-digit code to <span class="text-primary font-semibold tracking-wide">+92 300 XXXXXXX</span>
</p>
</div>
<!-- OTP Inputs Grid -->
<div class="flex justify-between gap-4 mb-8">
<!-- Box 1 -->
<div class="w-16 h-20 glass-panel rounded-xl flex items-center justify-center border-primary/40 otp-box-shadow">
<span class="font-headline-lg text-on-surface">1</span>
</div>
<!-- Box 2 -->
<div class="w-16 h-20 glass-panel rounded-xl flex items-center justify-center border-primary/40 otp-box-shadow">
<span class="font-headline-lg text-on-surface">2</span>
</div>
<!-- Box 3 (Active) -->
<div class="w-16 h-20 glass-panel rounded-xl flex items-center justify-center border-2 border-primary ring-4 ring-primary/10 otp-box-shadow">
<div class="w-[2px] h-8 bg-primary cursor-blink"></div>
</div>
<!-- Box 4 -->
<div class="w-16 h-20 glass-panel rounded-xl flex items-center justify-center border-outline-variant/30 otp-box-shadow">
<span class="font-headline-lg text-on-surface-variant/20"></span>
</div>
</div>
<!-- Timer & Resend -->
<div class="flex flex-col items-center gap-2 mb-auto">
<div class="flex items-center gap-2 px-4 py-2 rounded-full bg-surface-container-high/50 border border-outline-variant/20">
<span class="material-symbols-outlined text-label-lg text-on-surface-variant">schedule</span>
<span class="font-label-lg text-on-surface-variant">Resend code in <span class="text-primary font-bold">0:45</span></span>
</div>
</div>
<!-- Pakistani Workflow Specific Note (Optional UX enhancement) -->
<div class="text-center mb-8">
<p class="text-[12px] text-on-surface-variant/40 italic">
                Facing issues? Check your network or try again in a few minutes.
            </p>
</div>
<!-- Action Button -->
<div class="mt-auto">
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-title-lg flex items-center justify-center gap-2 shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all duration-300">
<span>Verify &amp; Enter</span>
<span class="material-symbols-outlined">chevron_right</span>
</button>
</div>
<!-- Custom Virtual Numeric Keyboard Simulation -->
<div class="mt-8 grid grid-cols-3 gap-2 opacity-90">
<!-- Simplified keyboard representation for visual flair -->
<div class="h-12 flex items-center justify-center font-title-lg text-on-surface-variant">1</div>
<div class="h-12 flex items-center justify-center font-title-lg text-on-surface-variant">2</div>
<div class="h-12 flex items-center justify-center font-title-lg text-on-surface-variant">3</div>
<div class="h-12 flex items-center justify-center font-title-lg text-on-surface-variant">4</div>
<div class="h-12 flex items-center justify-center font-title-lg text-on-surface-variant">5</div>
<div class="h-12 flex items-center justify-center font-title-lg text-on-surface-variant">6</div>
<div class="h-12 flex items-center justify-center font-title-lg text-on-surface-variant">7</div>
<div class="h-12 flex items-center justify-center font-title-lg text-on-surface-variant">8</div>
<div class="h-12 flex items-center justify-center font-title-lg text-on-surface-variant">9</div>
<div class="h-12 flex items-center justify-center font-title-lg text-on-surface-variant"></div>
<div class="h-12 flex items-center justify-center font-title-lg text-on-surface-variant">0</div>
<div class="h-12 flex items-center justify-center font-title-lg text-on-surface-variant">
<span class="material-symbols-outlined">backspace</span>
</div>
</div>
</main>
<script>
        // Micro-interaction: Update timer display
        let seconds = 45;
        const timerSpan = document.querySelector('.text-primary.font-bold');
        
        const countdown = setInterval(() => {
            seconds--;
            if (seconds < 10) {
                timerSpan.textContent = `0:0${seconds}`;
            } else {
                timerSpan.textContent = `0:${seconds}`;
            }
            
            if (seconds <= 0) {
                clearInterval(countdown);
                timerSpan.parentElement.innerHTML = '<span class="text-tertiary font-bold cursor-pointer underline underline-offset-4">Resend OTP Now</span>';
            }
        }, 1000);

        // Simulated Haptic feedback on button
        document.querySelector('button').addEventListener('click', () => {
            if (window.navigator.vibrate) {
                window.navigator.vibrate(20);
            }
        });
    </script>
</body></html>
