<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b1326; /* surface-dim */
            overflow-x: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .flux-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(77, 142, 255, 0.12) 0%, rgba(77, 142, 255, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus {
            -webkit-text-fill-color: #dae2fd;
            -webkit-box-shadow: 0 0 0px 1000px #171f33 inset;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "error": "#ffb4ab",
                      "on-tertiary-fixed": "#002109",
                      "on-primary": "#002e6a",
                      "on-tertiary": "#003915",
                      "secondary-container": "#3c4a5e",
                      "on-primary-fixed": "#001a42",
                      "on-error": "#690005",
                      "surface-variant": "#2d3449",
                      "surface-container-low": "#131b2e",
                      "inverse-on-surface": "#283044",
                      "on-secondary-fixed-variant": "#3a485c",
                      "primary-fixed-dim": "#adc6ff",
                      "primary": "#adc6ff",
                      "primary-fixed": "#d8e2ff",
                      "inverse-surface": "#dae2fd",
                      "tertiary-fixed-dim": "#4ae176",
                      "on-secondary": "#233144",
                      "on-error-container": "#ffdad6",
                      "surface-tint": "#adc6ff",
                      "on-surface": "#dae2fd",
                      "tertiary-fixed": "#6bff8f",
                      "surface-container-lowest": "#060e20",
                      "secondary": "#b9c7e0",
                      "tertiary-container": "#00a74b",
                      "on-primary-container": "#00285d",
                      "on-tertiary-container": "#003111",
                      "on-tertiary-fixed-variant": "#005321",
                      "on-secondary-fixed": "#0d1c2f",
                      "background": "#0b1326",
                      "secondary-fixed": "#d5e3fd",
                      "outline": "#8c909f",
                      "surface-dim": "#0b1326",
                      "on-background": "#dae2fd",
                      "surface-container": "#171f33",
                      "outline-variant": "#424754",
                      "surface-container-highest": "#2d3449",
                      "surface": "#0b1326",
                      "surface-container-high": "#222a3d",
                      "surface-bright": "#31394d",
                      "tertiary": "#4ae176",
                      "primary-container": "#4d8eff",
                      "inverse-primary": "#005ac2",
                      "on-secondary-container": "#abb9d2",
                      "error-container": "#93000a",
                      "on-primary-fixed-variant": "#004395",
                      "secondary-fixed-dim": "#b9c7e0",
                      "on-surface-variant": "#c2c6d6"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "spacing": {
                      "touch-target": "3rem",
                      "margin-horizontal": "1.5rem",
                      "stack-md": "0.75rem",
                      "stack-sm": "0.25rem",
                      "gutter": "0.5rem",
                      "stack-lg": "1.5rem"
              },
              "fontFamily": {
                      "body-md": ["Inter"],
                      "headline-md": ["Inter"],
                      "headline-lg": ["Inter"],
                      "body-lg": ["Inter"],
                      "title-lg": ["Inter"],
                      "label-sm": ["Inter"],
                      "label-lg": ["Inter"],
                      "headline-lg-mobile": ["Inter"]
              },
              "fontSize": {
                      "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "headline-md": ["22px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "headline-lg": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "title-lg": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                      "label-sm": ["11px", {"lineHeight": "16px", "fontWeight": "400"}],
                      "label-lg": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1px", "fontWeight": "500"}],
                      "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}]
              }
            },
          },
        }
      </script>
</head>
<body class="flex flex-col min-h-screen text-on-surface">
<!-- Atmospheric Background Effects -->
<div class="flux-glow top-0 left-[-20%]" id="glow-1"></div>
<div class="flux-glow bottom-0 right-[-20%]" id="glow-2"></div>
<main class="flex-1 w-full max-w-[400px] mx-auto z-10 flex flex-col px-6 py-12 justify-between">
<!-- Logo/Header Area - Pushed down ~18% from top -->
<div class="mt-[18%] mb-12">
<div class="mb-6 inline-flex items-center justify-center p-4 rounded-2xl bg-primary-container text-on-primary-container shadow-2xl">
<span class="material-symbols-outlined text-[36px]" data-icon="blur_on">blur_on</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px]">Sign in to continue your secure conversations.</p>
</div>
<!-- Form Section -->
<div class="flex flex-col gap-6">
<div class="flex flex-col gap-6">
<!-- Email/Phone Field -->
<div class="space-y-2">
<label class="text-label-lg font-label-lg text-on-surface-variant ml-1">Email or Phone Number</label>
<div class="flex items-center bg-surface-container border border-outline-variant/30 rounded-2xl px-4 h-16 focus-within:border-primary focus-within:ring-1 focus-within:ring-primary/30 transition-all shadow-inner">
<span class="material-symbols-outlined text-outline-variant/70 mr-3 text-[22px]" data-icon="alternate_email">alternate_email</span>
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-on-surface placeholder:text-outline-variant/50 font-body-lg text-body-lg" placeholder="example@flux.chat" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="text-label-lg font-label-lg text-on-surface-variant ml-1">Password</label>
<div class="flex items-center bg-surface-container border border-outline-variant/30 rounded-2xl px-4 h-16 focus-within:border-primary focus-within:ring-1 focus-within:ring-primary/30 transition-all shadow-inner">
<span class="material-symbols-outlined text-outline-variant/70 mr-3 text-[22px]" data-icon="lock">lock</span>
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-on-surface placeholder:text-outline-variant/50 font-body-lg text-body-lg" id="password-input" placeholder="••••••••" type="password"/>
<button class="text-on-surface-variant hover:text-on-surface transition-colors p-2" onclick="togglePassword()">
<span class="material-symbols-outlined text-[22px]" data-icon="visibility" id="password-toggle-icon">visibility</span>
</button>
</div>
<div class="flex justify-end pt-1">
<a class="font-label-lg text-label-lg text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot Password?</a>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-16 bg-primary-container text-on-primary-container font-title-lg text-title-lg rounded-2xl shadow-xl hover:shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-3 mt-4">
<span>Login</span>
<span class="material-symbols-outlined font-bold" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Social & Footer - Bottom Section -->
<div class="mt-auto pt-12">
<!-- Divider -->
<div class="flex items-center gap-4 mb-8">
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
<span class="font-label-sm text-[10px] text-on-surface-variant/40 uppercase tracking-widest whitespace-nowrap">Or login with</span>
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-4 mb-10">
<button class="flex items-center justify-center gap-2 h-14 rounded-2xl bg-surface-container-high/40 border border-outline-variant/20 hover:bg-surface-variant/30 transition-colors">
<img alt="Google" class="w-5 h-5 opacity-90" src="https://lh3.googleusercontent.com/aida-public/AB6AXuARsImK8iv4KVhdHOUIerIoSPGUvt2FdkgnGl0cvs_tDx2LbCST9JlJ5hxLnV-qKWpW9yJnNEyWrsL874Xjr6t4vxQHAL30fgPCNSYOTsYLZ-CbZGnKY6dcDMU6_IXq7m-hCNdNWz3OWvBGS-GXqUlEWrvxlVpukMK0TzOIQ-z1nB4Nn7EirXBoN4OEvUvUy3_7xbCV8tfH9asElcmKlhx68_5w9UDZk_SyHmMHOgxOkrU2AnG9Qrwl5v849FzDYDKS9ay5WkqqUus"/>
<span class="font-label-lg text-label-lg text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-2 h-14 rounded-2xl bg-surface-container-high/40 border border-outline-variant/20 hover:bg-surface-variant/30 transition-colors">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="fingerprint">fingerprint</span>
<span class="font-label-lg text-label-lg text-on-surface">Biometric</span>
</button>
</div>
<!-- Footer Link -->
<footer class="text-center pb-2">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary font-semibold ml-1 hover:underline underline-offset-4" href="#">Register</a>
</p>
</footer>
</div>
</main>
<script>
        function togglePassword() {
            const input = document.getElementById('password-input');
            const icon = document.getElementById('password-toggle-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        // Smooth atmospheric movement
        document.addEventListener('mousemove', (e) => {
            const glow1 = document.getElementById('glow-1');
            const glow2 = document.getElementById('glow-2');
            
            const x = e.clientX;
            const y = e.clientY;
            
            requestAnimationFrame(() => {
                glow1.style.transform = `translate(${x/25}px, ${y/25}px)`;
                glow2.style.transform = `translate(${-x/25}px, ${-y/25}px)`;
            });
        });
    </script>
</body></html>
